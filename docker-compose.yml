# 一键启动 ailens360 全栈：应用（从源码构建） + Postgres + Redis。
# 适合自部署到一台服务器直接跑起来。
services:
  postgres:
    image: postgres:16-alpine
    container_name: ailens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ailens
      POSTGRES_PASSWORD: ailens
      POSTGRES_DB: ailens360
    volumes:
      - ailens-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailens -d ailens360"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ailens-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ailens-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ailens360:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        ALL_PROXY: ${ALL_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: ailens360/ailens360:latest
    container_name: ailens360
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AILENS360_PROXY_ADDR: 0.0.0.0:8080
      AILENS360_API_ADDR: 0.0.0.0:8080
      AILENS360_DB_DSN: postgres://ailens:ailens@postgres:5432/ailens360?sslmode=disable
      AILENS360_REDIS_ADDR: redis:6379
      AILENS360_AUTH_USERNAME: ${AILENS360_AUTH_USERNAME:-admin}
      AILENS360_AUTH_PASSWORD: ${AILENS360_AUTH_PASSWORD:-admin}
      # 必填：openssl rand -hex 32 生成后写到 .env
      AILENS360_JWT_SECRET: ${AILENS360_JWT_SECRET:?set AILENS360_JWT_SECRET in .env (openssl rand -hex 32)}

volumes:
  ailens-pg:
  ailens-redis:
